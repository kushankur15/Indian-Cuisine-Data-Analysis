<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glow Donut Chart</title>

  <style>
    body{
      margin:0;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    .chart-wrapper{
      position:relative;
      width:520px;
      height:520px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* Red glow */
    .chart-wrapper::before{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      left:40px;
      top:50px;
      background:rgba(255,0,0,0.22);
      filter:blur(90px);
      border-radius:50%;
      z-index:0;
    }

    /* Orange glow */
    .chart-wrapper::after{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      right:40px;
      top:50px;
      background:rgba(255,120,0,0.22);
      filter:blur(90px);
      border-radius:50%;
      z-index:0;
    }

    .donut{
        position:relative;
        width:460px;
        height:460px;
        border-radius:50%;
        background:
          conic-gradient(
            #ff2b2b 0deg 181.8deg,     /* Zomato - Red */
            #ff7a1a 181.8deg 360deg   /* Swiggy - Orange */
          );
        z-index:2;
      }

    /* Inner hole */
    .donut::before{
      content:"";
      position:absolute;
      inset:110px;
      background:#000;
      border-radius:50%;
      z-index:3;
    }

    .label{
      position:absolute;
      color:#f2f2f2;
      font-size:20px;
      font-weight:500;
      line-height:1.2;
      z-index:5;
      text-align:center;
    }

    .left-label{
      left:-70px;
      top:50%;
      transform:translateY(-50%);
    }

    .right-label{
      right:-70px;
      top:50%;
      transform:translateY(-50%);
    }
  </style>
</head>

<body>

  <div class="chart-wrapper">

    <div class="label right-label">
      Zomato<br>50.5%
    </div>

    <div class="donut"></div>

    <div class="label left-label">
      Swiggy<br>49.5%
    </div>

  </div>

</body>
</html>
